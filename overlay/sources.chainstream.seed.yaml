# ============================================================
# Twitter / X keyword search (v1.0.26)
# ============================================================
# Runs Twitter v2 search_recent_tweets alongside the KOL pulls above.
# Required envs to enable (already set in env.chainstream.template):
#   AGENTFLOW_TWITTER_SEARCH_ENABLED=true
#   TWITTER_BEARER_TOKEN=<your_v2_bearer_token>
# `weight` semantics match twitter_kols.
twitter_search:
  - query: "(\"MEV\" OR \"Maximal Extractable Value\" OR \"MEV bot\" OR \"smart wallet\" OR rollup OR \"account abstraction\") (crypto OR onchain OR ethereum OR solana OR wallet OR blockchain)"
    max_results: 30
    weight: high
    note: "core chainstream beat — protocol-level on-chain flow. 1.0.8 — tightened: bare unquoted MEV was matching Arabic coupon-spam containing the string 'MEv' (the Joseph-cluster sibling failure mode); now the OR-set must ALSO co-occur with an unambiguous crypto context token."
  - query: "(on-chain OR onchain) (data OR analytics OR indexer)"
    max_results: 30
    weight: high
    note: "data infra signal"
  - query: "(\"Multi-Chain Protocol\" OR x402 OR \"agent payments\") (crypto OR onchain OR wallet)"
    max_results: 30
    weight: high
    note: "agent execution surface — 1.0.8 disambiguated bare MCP (collided with Anthropic Model Context Protocol and pulled in @karpathy CPU-architecture posts)"
  - query: "Solana mempool OR \"DEX routing\" OR \"smart money\""
    max_results: 25
    weight: medium
    note: "trade execution + smart-money flow"
  - query: "\"intent settlement\" OR \"intent-based\" OR EigenLayer OR restaking"
    max_results: 25
    weight: medium
    note: "settlement layer + restaking infra"
  - query: "(\"Know Your Transaction\" OR \"Know Your Address\" OR OFAC OR \"crypto compliance\") (crypto OR onchain OR wallet)"
    max_results: 20
    weight: medium
    note: "compliance signal — 1.0.8: bare KYA collided with Hindi 'kya' (= what?) and pulled in @-reply Hindi conversational chatter (Joseph cluster). Use the spelled-out forms; OFAC is fine since it's a unique English acronym."

# ============================================================
# RSS Feeds — crypto / infra only.
# Operator: extend with protocol-specific blogs (Optimism, Arbitrum,
# Solana foundation, etc.) over time. Bad URLs degrade gracefully —
# feedparser logs a per-feed error and the rest of the scan continues.
# ============================================================
rss_feeds:
  - url: "https://decentralisedco.com/feed"
    name: "Decentralised.co"
    relevance_to_series: ["C"]
  - url: "https://messari.io/rss"
    name: "Messari Research"
    relevance_to_series: ["C"]
  - url: "https://matt.blwt.io/feed/feed.rss"
    name: "Matt Blewitt (Blockworks)"
    relevance_to_series: ["C"]

  # 1.0.7 — verified live crypto-infra feeds. All four URLs were probed
  # with curl -A "feedparser/6.0" and confirmed 200 + valid RSS XML.
  # Galaxy and Paradigm were dropped from the v1.0.4 attempt because
  # they don't publish public RSS at any obvious path (Galaxy redirects
  # /research/feed/ to an HTML insights page; Paradigm 404s on every
  # feed.xml / rss.xml / writing/feed.xml variant).
  - url: "https://variant.fund/feed/"
    name: "Variant Fund"
    relevance_to_series: ["C"]
    note: "infra-leaning crypto VC; small but high-signal feed"
  - url: "https://www.bankless.com/rss/feed"
    name: "Bankless"
    relevance_to_series: ["C"]
    note: "DeFi-focused newsletter; redirected from /feed"
  - url: "https://thedefiant.io/api/feed"
    name: "The Defiant"
    relevance_to_series: ["C"]
    note: "DeFi journalism; canonical at /api/feed after 301"
  - url: "https://blog.ethereum.org/en/feed.xml"
    name: "Ethereum Foundation Blog"
    relevance_to_series: ["C"]
    note: "protocol-level Ethereum updates; large catalog"

# ============================================================
# HackerNews — crypto-infra keywords. The framework example used
# "AI" / "Claude" / "LLM" which matches half of HN front page on any
# given day. We swap to terms that actually filter for chainstream's
# beat.
# ============================================================
hackernews:
  enabled: true
  filter_keywords:
    - "MEV"
    - "Solana"
    - "rollup"
    - "DEX"
    - "indexer"
    - "mempool"
    - "OFAC"
    - "KYT"
    - "on-chain"
    - "smart wallet"
    - "account abstraction"
    - "x402"
    - "Multi-Chain Protocol"
    - "crypto agent"
    - "onchain agent"
  relevance_to_series: ["C"]
  min_score: 50

# ============================================================
# Discovery defaults — same as framework. Operator can tighten.
# ============================================================
discovery_config:
  scan_frequency_hours: 12
  daily_candidates_target: 12
  min_discussion_volume: 50
  min_hn_score: 50
  time_decay_hours: 48
  cross_source_bonus: 0.3
  series_weight:
    series_A: 0.10
    series_B: 0.30
    series_C: 0.60   # crypto-infra is the dominant lane for ChainStream
