# ChainStream sources seed — landed at ~/.agentflow/sources.yaml on first
# install. Seeded ONLY if the operator's existing sources.yaml is missing
# (apply_overlay.sh refuses to clobber).
#
# Diff from the framework example sources.yaml.example:
#   - Twitter KOLs trimmed to crypto-infra signal. General-tech accounts
#     (@sama / @paulg / @karpathy / @simonw / @patrickc / @dhh) are
#     listed but with `weight: blocked` so they don't fire by default —
#     keeps them on disk in case the operator wants to flip them on
#     later, but no signal pollution out of the box.
#   - HN keywords swapped from broad ("AI" / "Claude" / "LLM") to
#     crypto-infra specific (MEV / rollup / DEX / indexer / mempool /
#     OFAC / KYT / on-chain / wallet).
#   - RSS list pruned to crypto/infra publications.
#   - The operator extends the KOL list with their own crypto-infra
#     follow list — this seed is intentionally short, not an
#     authoritative roster.

version: "1.0"
last_updated: "2026-04-30"

